<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100% !important; height: 100% !important; object-fit: contain; cursor: crosshair !important; }
  </style>
  <script src="/wasm_exec.js"></script>
</head>
<body>
  <script>
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch('/falling-sand.wasm'), go.importObject).then((result) => {
      go.run(result.instance);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.parent.postMessage('closeModal', '*');
      }
    });
  </script>
</body>
</html>
